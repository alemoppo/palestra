<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Palestra</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
       background: #f5f5f5; color: #222; padding-bottom: 80px; }
h1 { font-size: 22px; text-align: center; padding: 16px; background: #2F5496; color: #fff; margin: 0; }

.sticky-header { position: sticky; top: 0; z-index: 10; }
.tabs { display: flex; background: #2F5496; padding: 0 8px 8px; gap: 4px; }
.tab { flex: 1; text-align: center; padding: 8px; color: #ffffffcc; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 13px; font-weight: 600; }
.tab.active { background: #f5f5f5; color: #2F5496; }
.tab-cont { display: none; padding: 12px; }
.tab-cont.active { display: block; }
.card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.card h3 { font-size: 16px; margin-bottom: 8px; color: #333; }
input[type="text"] { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
input:focus { outline: none; border-color: #2F5496; }
.ex-row { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.ex-row .ex-cb { width: 20px; height: 20px; cursor: pointer; flex-shrink: 0; accent-color: #2F5496; }
.ex-row .ex-name { flex: 1; font-size: 14px; font-weight: 500; }
.ex-row .ex-name.dim { color: #bbb; }
.ex-row .promote-btn { cursor: pointer; font-size: 16px; padding: 2px 5px; border: 1px solid #ccc; background: transparent; color: #999; flex-shrink: 0; border-radius: 4px; line-height: 1; user-select: none; }
.ex-row .promote-btn.active { color: #fff; background: #4CAF50; border-color: #4CAF50; }
.ex-row input { width: 100px; text-align: center; flex-shrink: 0; }
.btn { display: inline-block; padding: 10px 20px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-primary { background: #2F5496; color: #fff; width: 100%; }
.btn-primary:active { background: #1d3a6e; }
.btn-sm { padding: 6px 12px; font-size: 13px; }
.btn-danger { background: #d32f2f; color: #fff; }
.btn-outline { background: transparent; border: 1.5px solid #2F5496; color: #2F5496; }
.btn-outline:active { background: #e8edf5; }
.day-header { font-size: 20px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.day-header .arrow { font-size: 22px; cursor: pointer; padding: 0 4px; user-select: none; color: #2F5496; }
.day-header .arrow:active { opacity: 0.5; }
.day-header .title { flex: 1; text-align: center; font-weight: 700; }
.day-sub { font-size: 13px; color: #777; margin-bottom: 14px; }
.config-day { margin-bottom: 16px; }
.config-day h4 { font-size: 15px; margin-bottom: 6px; padding: 6px 10px; border-radius: 6px; }
.config-day h4.c1 { background: #D6E4F0; color: #2F5496; }
.config-day h4.c2 { background: #E2EFDA; color: #548235; }
.config-day h4.c3 { background: #FCE4D6; color: #C55A11; }
.config-ex { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.config-ex input { flex: 1; }
.config-ex .btn { flex-shrink: 0; }
.add-ex-btn { margin-top: 4px; }
.summary-wrap { overflow-x: auto; }
.summary-table { border-collapse: collapse; font-size: 12px; width: max-content; min-width: 100%; }
.summary-table th, .summary-table td { border: 1px solid #ccc; padding: 5px 8px; text-align: center; white-space: nowrap; }
.summary-table th { background: #2F5496; color: #fff; font-weight: 600; position: sticky; top: 0; z-index: 3; }
.summary-table th.ex-name { z-index: 4; left: 0; }
.summary-table th[contenteditable]:hover { background: #1d3a6e; cursor: text; }
.summary-table .ex-name { text-align: left; font-weight: 500; position: sticky; left: 0; background: #fff; z-index: 2; }
.summary-table .ex-name.sticky { z-index: 3; }
.summary-table tfoot td.ex-name { background: #f5f5f5; }
.summary-table .grp-header { font-weight: 700; text-align: left; }
.summary-table .grp-header.g1 { background: #D6E4F0; color: #2F5496; }
.summary-table .grp-header.g2 { background: #E2EFDA; color: #548235; }
.summary-table .grp-header.g3 { background: #FCE4D6; color: #C55A11; }
.summary-table .grp-header td:first-child { position: sticky; left: 0; z-index: 2; }
.summary-table .grp-header.g1 td:first-child { background: #D6E4F0; }
.summary-table .grp-header.g2 td:first-child { background: #E2EFDA; }
.summary-table .grp-header.g3 td:first-child { background: #FCE4D6; }
.summary-table .inc { background: #FFA500 !important; font-weight: 700; }
.summary-table .no-data { color: #bbb; }
.summary-table td[contenteditable]:hover { outline: 2px dashed #2F5496; outline-offset: -2px; cursor: text; }
.summary-table td[contenteditable]:focus { outline: 2px solid #2F5496; outline-offset: -2px; background: #fffbe6; }
.wo-msg { margin-top:8px; font-size:13px; color:#2F5496; text-align:center; }
#welcome { position: fixed; inset: 0; background: #f5f5f5; z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 32px; text-align: center; }
#welcome h2 { font-size: 24px; color: #2F5496; margin-bottom: 16px; }
#welcome .btn { margin-bottom: 10px; max-width: 260px; }
#app { display: none; }
</style>
</head>
<body>

<div id="welcome">
  <h2>&#x1F4AA; Palestra</h2>
  <button class="btn btn-primary" onclick="loadFile()">Carica file JSON</button>
  <p style="margin-top:32px;font-size:11px;color:#ccc"><a href="#" onclick="startFresh();return false" style="color:#ccc;text-decoration:none;border-bottom:1px dotted #ccc">oppure inizia una sessione vuota</a></p>
</div>

<div id="app">
<div class="sticky-header">
<h1>&#x1F4AA; Palestra</h1>

<div class="tabs">
  <div class="tab active" data-tab="workout">Allenamento</div>
  <div class="tab" data-tab="config">Configurazione</div>
  <div class="tab" data-tab="summary">Riepilogo</div>
</div>
</div>

<div class="tab-cont active" id="tab-workout">
  <div class="card">
    <input type="hidden" id="wo-day" value="1">
    <div class="day-header"><span class="arrow" onclick="prevDay()">&#x25C0;</span><span class="title" id="wo-day-title">Giorno 1</span><span class="arrow" onclick="nextDay()">&#x25B6;</span></div>
    <div class="day-sub" id="wo-day-sub">caricamento...</div>
    <div id="wo-ex-list"></div>
    <button class="btn btn-primary" onclick="saveWorkout()">Salva Allenamento</button>
    <div class="wo-msg" id="wo-msg"></div>
  </div>
</div>

<div class="tab-cont" id="tab-config">
  <div class="card">
    <p style="font-size:13px;color:#666;margin-bottom:10px">Aggiungi o rimuovi esercizi per ogni giorno. I cambiamenti non cancellano la cronologia.</p>
    <div id="config-days"></div>
    <button class="btn btn-primary" onclick="saveConfig()">Salva Configurazione</button>
    <div class="wo-msg" id="cfg-msg"></div>
  </div>
  <div class="card">
    <h3>Backup dati</h3>
    <p style="font-size:13px;color:#666;margin-bottom:10px">Esporta il file JSON per backup o trasferimento.</p>
    <button class="btn btn-outline" style="width:100%" onclick="exportData()">&#x2193; Esporta file JSON</button>
    <button class="btn btn-outline" style="width:100%;margin-top:6px" onclick="loadFile()">&#x2191; Importa file JSON</button>
    <div class="wo-msg" id="bak-msg"></div>
  </div>
</div>

<div class="tab-cont" id="tab-summary">
  <div class="card">
    <div class="summary-wrap" id="summary-wrap"></div>
  </div>
  <div class="card">
    <div style="display:flex;gap:6px">
      <button class="btn btn-outline" style="flex:1" onclick="exportData()">&#x2193; Esporta</button>
      <button class="btn btn-outline" style="flex:1" onclick="loadFile()">&#x2191; Importa</button>
    </div>
    <div class="wo-msg" id="sum-msg"></div>
  </div>
</div>
</div>

<script>
// ============= ANDROID BRIDGE =============
const isAndroid = typeof Android !== 'undefined' && Android !== null;

function persistData() {
  if (isAndroid) {
    try { Android.saveData(JSON.stringify(data)); } catch(e) { console.error(e); }
  }
}

let data = null;

function defaultData() {
  return {
    days: [
      { name: 'Giorno 1 \u2013 Petto & Bicipiti', exercises: ['Chest Press (panca piana)', 'Incline Press 30\u00b0 (manubri)', 'Pec Fly', 'Bilanciere EZ', 'Bicipiti Curl (manubri seduto)'] },
      { name: 'Giorno 2 \u2013 Gambe & Spalle', exercises: ['Hack Squat / Pressa', 'Leg Extension', 'Leg Curl', 'Spinte in alto (manubri 75\u00b0)', 'Alzate laterali'] },
      { name: 'Giorno 3 \u2013 Dorso & Tricipiti', exercises: ['Trazioni assistite', 'Lat Machine', 'Pulley', 'Pesi dietro schiena', 'Pushdown ai cavi'] },
    ],
    workouts: []
  };
}

function loadFromBridge() {
  if (!isAndroid) { showWelcome(); return; }
  try {
    const json = Android.loadData();
    if (json) {
      data = JSON.parse(json);
      enterApp();
    } else {
      data = defaultData();
      persistData();
      enterApp();
    }
  } catch(e) {
    data = defaultData();
    enterApp();
  }
}

function startFresh() {
  data = defaultData();
  enterApp();
}

function loadFile() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!imported.days || !imported.workouts) throw new Error('Formato non valido');
        data = imported;
        enterApp();
        persistData();
      } catch(err) { alert('Errore: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function showWelcome() {
  document.getElementById('welcome').style.display = 'flex';
}

function enterApp() {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderWorkout();
  renderConfig();
}

function downloadJSON() {
  if (isAndroid) {
    const json = JSON.stringify(data, null, 2);
    Android.exportToDownloads(json);
  } else {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const now = new Date();
    a.download = 'palestra-data-' + now.toISOString().slice(0,10) + '.json';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }
}

// persistent state for workout form across tab switches
var savedWorkoutState = null;

function saveWorkoutState() {
  const daySel = document.getElementById('wo-day');
  const dayNum = daySel ? parseInt(daySel.value) : 0;
  if (!dayNum) return;
  const dayCfg = data.days[dayNum - 1];
  if (!dayCfg) return;
  const checked = [], weights = [];
  dayCfg.exercises.forEach((_, i) => {
    const cb = document.getElementById('wo-cb-' + i);
    const w = document.getElementById('wo-w-' + i);
    checked[i] = cb ? cb.checked : false;
    weights[i] = w ? w.value : '';
  });
  savedWorkoutState = { dayNum: dayNum, checked: checked, weights: weights };
}

function restoreWorkoutState() {
  if (!savedWorkoutState) return;
  const state = savedWorkoutState;
  const daySel = document.getElementById('wo-day');
  if (!daySel) return;
  const curDay = parseInt(daySel.value);
  if (curDay !== state.dayNum) return;   // day changed, don't restore
  const dayCfg = data.days[curDay - 1];
  if (!dayCfg) return;
  dayCfg.exercises.forEach((_, i) => {
    const cb = document.getElementById('wo-cb-' + i);
    const w = document.getElementById('wo-w-' + i);
    if (cb && i < state.checked.length) { cb.checked = state.checked[i]; }
    if (w && i < state.weights.length) { w.value = state.weights[i]; }
  });
  // re-apply dimming
  dayCfg.exercises.forEach((_, i) => {
    const cb = document.getElementById('wo-cb-' + i);
    const nameEl = document.getElementById('wo-name-' + i);
    if (cb && nameEl) { nameEl.style.opacity = cb.checked ? '0.45' : '1'; }
  });
}

// ============= TABS =============
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    // save workout state before leaving the tab
    if (document.getElementById('tab-workout').classList.contains('active')) {
      saveWorkoutState();
    }
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-cont').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'workout') { renderWorkout(); restoreWorkoutState(); }
    if (tab.dataset.tab === 'summary') renderSummary();
  });
});

// ============= WORKOUT =============
var manualDay = 0;

function getNextDay() {
  if (manualDay) return manualDay;
  const ws = data.workouts;
  if (ws.length === 0) return 1;
  return ((ws[ws.length - 1].day) % 3) + 1;
}

function changeDay(delta) {
  const cur = getNextDay();
  manualDay = ((cur + delta - 1 + 3) % 3) + 1;
  renderWorkout();
}

function prevDay() { changeDay(-1); }
function nextDay() { changeDay(1); }

function getLastWorkoutForDay(day) {
  for (let i = data.workouts.length - 1; i >= 0; i--)
    if (data.workouts[i].day === day) return data.workouts[i];
  return null;
}

function renderWorkout() {
  if (!data) return;
  const dayNum = getNextDay();
  const dayIdx = dayNum - 1;
  const dayCfg = data.days[dayIdx];
  const lastWo = getLastWorkoutForDay(dayNum);

  // compute auto day (next after last saved, ignoring manual override)
  const ws = data.workouts;
  const autoDay = ws.length === 0 ? 1 : ((ws[ws.length - 1].day) % 3) + 1;
  const isNext = dayNum === autoDay;

  document.getElementById('wo-day').value = dayNum;
  const titleEl = document.getElementById('wo-day-title');
  titleEl.textContent = dayCfg.name;
  titleEl.style.fontWeight = isNext ? '700' : '400';
  const now = new Date();
  document.getElementById('wo-day-sub').textContent = now.toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  const list = document.getElementById('wo-ex-list');
  list.innerHTML = '';
  dayCfg.exercises.forEach((ex, i) => {
    const div = document.createElement('div');
    div.className = 'ex-row';
    const v = lastWo ? (lastWo.weights[i] || '') : '';
    const promoted = lastWo && lastWo.promote && lastWo.promote[i] ? true : false;
    div.innerHTML = '<input type="checkbox" class="ex-cb" id="wo-cb-' + i + '" onchange="toggleEx(' + i + ')">'
      + '<span class="ex-name" id="wo-name-' + i + '">' + ex + '</span>'
      + '<span class="promote-btn' + (promoted ? ' active' : '') + '" id="wo-promote-' + i + '" onclick="togglePromote(' + i + ')">\u2191</span>'
      + '<input type="text" inputmode="decimal" id="wo-w-' + i + '" placeholder="kg" value="' + v.replace(/"/g,'&quot;') + '" oninput="clearPromote(' + i + ')">';
    list.appendChild(div);
  });
  document.getElementById('wo-msg').textContent = '';
}

function toggleEx(i) {
  const cb = document.getElementById('wo-cb-' + i);
  const name = document.getElementById('wo-name-' + i);
  name.className = 'ex-name' + (cb.checked ? ' dim' : '');
}

function togglePromote(i) {
  const btn = document.getElementById('wo-promote-' + i);
  btn.classList.toggle('active');
}

function clearPromote(i) {
  const btn = document.getElementById('wo-promote-' + i);
  if (btn.classList.contains('active')) btn.classList.remove('active');
}

function saveWorkout() {
  const dayNum = getNextDay();
  const dayIdx = dayNum - 1;
  const dayCfg = data.days[dayIdx];
  const weights = {};
  const promote = {};
  let hasAny = false;
  dayCfg.exercises.forEach((ex, i) => {
    const cb = document.getElementById('wo-cb-' + i);
    if (!cb.checked) { weights[i] = ''; return; }
    const val = document.getElementById('wo-w-' + i).value.trim();
    if (val) hasAny = true;
    weights[i] = val;
    const btn = document.getElementById('wo-promote-' + i);
    promote[i] = btn ? btn.classList.contains('active') : false;
  });
  if (!hasAny) { document.getElementById('wo-msg').textContent = 'Seleziona e inserisci almeno un peso.'; return; }

  data.workouts.push({ date: new Date().toISOString().slice(0,10), day: dayNum, weights: weights, promote: promote });
  persistData();
  if (!isAndroid) downloadJSON();
  document.getElementById('wo-msg').textContent = '\u2713 Allenamento salvato!';
  manualDay = 0;
  renderWorkout();
}

// ============= CONFIG =============
function renderConfig() {
  if (!data) return;
  const cont = document.getElementById('config-days');
  cont.innerHTML = '';
  data.days.forEach((day, di) => {
    const div = document.createElement('div');
    div.className = 'config-day';
    const h4 = document.createElement('h4');
    h4.className = 'c' + (di+1);
    const nameSpan = document.createElement('span'); nameSpan.textContent = day.name; h4.appendChild(nameSpan);
    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-sm btn-outline';
    editBtn.style.cssText = 'float:right;padding:2px 8px;font-size:11px';
    editBtn.textContent = 'rinomina';
    editBtn.onclick = () => { const n = prompt('Nome giorno:', day.name); if (n && n.trim()) { data.days[di].name = n.trim(); renderConfig(); } };
    h4.appendChild(editBtn); div.appendChild(h4);

    day.exercises.forEach((ex, ei) => {
      const row = document.createElement('div'); row.className = 'config-ex';
      const inp = document.createElement('input'); inp.type = 'text'; inp.value = ex;
      inp.onchange = () => { data.days[di].exercises[ei] = inp.value.trim(); };
      row.appendChild(inp);
      const del = document.createElement('button'); del.className = 'btn btn-sm btn-danger'; del.textContent = '\u2716';
      del.onclick = () => { data.days[di].exercises.splice(ei, 1); renderConfig(); };
      row.appendChild(del); div.appendChild(row);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'btn btn-sm btn-outline add-ex-btn'; addBtn.textContent = '+ Aggiungi esercizio';
    addBtn.onclick = () => { const n = prompt('Nome esercizio:'); if (n && n.trim()) { data.days[di].exercises.push(n.trim()); renderConfig(); } };
    div.appendChild(addBtn); cont.appendChild(div);
  });
}

function saveConfig() {
  persistData();
  if (!isAndroid) downloadJSON();
  document.getElementById('cfg-msg').textContent = '\u2713 Configurazione salvata!';
  setTimeout(() => document.getElementById('cfg-msg').textContent = '', 2500);
}

function exportData() {
  downloadJSON();
  var el = document.querySelector('.tab-cont.active #bak-msg') || document.querySelector('.tab-cont.active #sum-msg');
  if (el) { el.textContent = '\u2713 JSON esportato nella cartella Download.'; setTimeout(function() { el.textContent = ''; }, 3000); }
}

// ============= SUMMARY =============
function parseNum(val) {
  if (!val || val === '\u2014') return null;
  if (val.toLowerCase().includes('senza pesi')) return 0;
  const m = val.match(/(\d+(?:\.\d+)?)/);
  return m ? parseFloat(m[1]) : null;
}

function onCellEdit(cell) {
  var wi = parseInt(cell.getAttribute('data-w'));
  var ei = parseInt(cell.getAttribute('data-e'));
  var newVal = cell.textContent.trim();
  data.workouts[wi].weights[ei] = newVal;
  persistData();
  renderSummary();
  // keep focus on the edited cell after re-render
  var all = document.querySelectorAll('#summary-wrap td[contenteditable]');
  for (var i = 0; i < all.length; i++) {
    if (parseInt(all[i].getAttribute('data-w')) === wi && parseInt(all[i].getAttribute('data-e')) === ei) {
      all[i].focus();
      break;
    }
  }
}

function onDateEdit(cell) {
  var wi = parseInt(cell.getAttribute('data-wi'));
  var val = cell.textContent.trim();
  var m = val.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) {
    var newDate = m[3] + '-' + m[2].padStart(2,'0') + '-' + m[1].padStart(2,'0');
    data.workouts[wi].date = newDate;
    persistData();
  }
  renderSummary();
  var headers = document.querySelectorAll('#summary-wrap th[contenteditable]');
  for (var i = 0; i < headers.length; i++) {
    if (parseInt(headers[i].getAttribute('data-wi')) === wi) { headers[i].focus(); break; }
  }
}

function deleteWorkout(ci) {
  if (!confirm('Eliminare definitivamente questo giorno di allenamento?')) return;
  data.workouts.splice(ci, 1);
  persistData();
  renderSummary();
}

function renderSummary() {
  if (!data) return;
  var wrap = document.getElementById('summary-wrap');
  var flatExs = [];
  var exDayMap = {};
  data.days.forEach(function(day, di) { day.exercises.forEach(function(ex) { flatExs.push(ex); exDayMap[ex] = di; }); });

  if (data.workouts.length === 0) {
    wrap.innerHTML = '<p style="color:#999;text-align:center">Nessun allenamento salvato.</p>'; return;
  }

  var dates = data.workouts.map(function(w) { var d = new Date(w.date+'T00:00:00'); return d.toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric' }); });
  var lastNum = {};
  var matrix = flatExs.map(function() { return Array(data.workouts.length).fill(''); });
  var incMatrix = flatExs.map(function() { return Array(data.workouts.length).fill(false); });
  var cellMeta = flatExs.map(function() { return Array(data.workouts.length).fill(null); });

  data.workouts.forEach(function(w, ci) {
    var dayExs = data.days[w.day-1].exercises;
    dayExs.forEach(function(ex, ei) {
      var fi = flatExs.indexOf(ex); if (fi === -1) return;
      var raw = w.weights[ei] || '';
      matrix[fi][ci] = raw || '\u2014';
      cellMeta[fi][ci] = { wi: ci, ei: ei };
      var n = parseNum(raw);
      if (n !== null) { if (fi in lastNum && n > lastNum[fi]) incMatrix[fi][ci] = true; lastNum[fi] = n; }
    });
  });

  var html = '<table class="summary-table"><thead><tr><th class="ex-name">Esercizio</th>';
  dates.forEach(function(d, ci) { html += '<th contenteditable="true" data-wi="' + ci + '" onblur="onDateEdit(this)" onkeydown="if(event.key==\'Enter\'){event.preventDefault();this.blur()}">' + d + '</th>'; });
  html += '</tr></thead><tbody>';

  var lastDay = -1;
  flatExs.forEach(function(ex, fi) {
    var dayNum = exDayMap[ex] + 1;
    if (dayNum !== lastDay) {
      lastDay = dayNum;
      html += '<tr class="grp-header g' + dayNum + '"><td class="ex-name sticky">' + data.days[dayNum-1].name + '</td>';
      for (var ci = 0; ci < data.workouts.length; ci++) html += '<td></td>';
      html += '</tr>';
    }
    html += '<tr><td class="ex-name">' + ex + '</td>';
    for (var ci = 0; ci < data.workouts.length; ci++) {
      var val = matrix[fi][ci];
      var meta = cellMeta[fi][ci];
      var editable = meta && val && val !== '\u2014';
      var attrs = 'class="' + (incMatrix[fi][ci] ? 'inc' : (!val || val === '\u2014' ? 'no-data' : '')) + '"';
      if (editable) {
        attrs += ' contenteditable="true" data-w="' + meta.wi + '" data-e="' + meta.ei + '" onblur="onCellEdit(this)"';
      }
      html += '<td ' + attrs + '>' + (val||'') + '</td>';
    }
    html += '</tr>';
  });
  html += '</tbody>';
  // delete row at bottom
  html += '<tfoot><tr><td class="ex-name" style="background:#f5f5f5;color:#999;font-size:11px;text-align:center">Elimina</td>';
  for (var ci = 0; ci < data.workouts.length; ci++) {
    html += '<td style="background:#f5f5f5;padding:2px 4px;text-align:center"><span style="cursor:pointer;color:#d32f2f;font-size:16px" onclick="deleteWorkout(' + ci + ')">\u2716</span></td>';
  }
  html += '</tr></tfoot>';
  html += '</table>';
  wrap.innerHTML = html;
}

// ============= INIT =============
if (isAndroid) {
  loadFromBridge();
} else {
  showWelcome();
}
</script>
</body>
</html>
